openapi: 3.1.0
info:
  title: Image Redaction Service API
  version: 0.3.3
  description: |
    REST API for blurring sensitive regions in images using normalized coordinates.
    The same service also exposes an MCP Streamable HTTP endpoint at /mcp.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Health
    description: Service status endpoints.
  - name: Images
    description: Image redaction operations.
  - name: MCP
    description: MCP Streamable HTTP endpoint.
  - name: Documentation
    description: API description files.
paths:
  /health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Get service health and version metadata.
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                ok:
                  value:
                    status: ok
                    version: 0.3.3
                    mcp:
                      transport: streamable-http
                      path: /mcp
  /openapi.yaml:
    get:
      tags:
        - Documentation
      operationId: getOpenApiYaml
      summary: Get the OpenAPI document for the REST service.
      responses:
        '200':
          description: OpenAPI YAML document.
          content:
            application/yaml:
              schema:
                type: string
  /v1/images/blur-sensitive-regions:
    post:
      tags:
        - Images
      operationId: blurSensitiveRegions
      summary: Blur sensitive regions in an image.
      description: |
        Accepts an image as a data URL or raw base64 string and a list of normalized
        regions. Remote HTTP/HTTPS image URLs are rejected unless
        ALLOW_REMOTE_IMAGE_SOURCE=true is set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlurSensitiveRegionsRequest'
            examples:
              dataUrlJpeg:
                summary: Blur a region in a JPEG data URL and return WebP.
                value:
                  imageSource: data:image/jpeg;base64,...
                  regions:
                    - x: 0.12
                      y: 0.18
                      width: 0.32
                      height: 0.12
                      paddingPixels: 8
                      blurRadius: 18
                  options:
                    outputType: image/webp
                    quality: 90
                    returnDataUrl: true
      responses:
        '200':
          description: Redacted image and processing metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlurSensitiveRegionsResponse'
              examples:
                success:
                  value:
                    image: data:image/webp;base64,...
                    mimeType: image/webp
                    outputFormat: webp
                    width: 1920
                    height: 1080
                    regionsProcessed: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '408':
          $ref: '#/components/responses/RequestTimeout'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /mcp:
    post:
      tags:
        - MCP
      operationId: postMcp
      summary: MCP Streamable HTTP endpoint.
      description: |
        Stateless MCP Streamable HTTP endpoint for JSON-RPC requests, including
        tools/list and tools/call for the blur_sensitive_regions MCP tool.
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
            default: application/json, text/event-stream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonRpcRequest'
            examples:
              toolsList:
                summary: List MCP tools.
                value:
                  jsonrpc: '2.0'
                  id: 1
                  method: tools/list
                  params: {}
      responses:
        '200':
          description: MCP JSON-RPC response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - MCP
      operationId: getMcp
      summary: Unsupported for this stateless MCP endpoint.
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
    delete:
      tags:
        - MCP
      operationId: deleteMcp
      summary: Unsupported for this stateless MCP endpoint.
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
        - mcp
      properties:
        status:
          type: string
          enum:
            - ok
        version:
          type: string
          examples:
            - 0.3.3
        mcp:
          type: object
          required:
            - transport
            - path
          properties:
            transport:
              type: string
              enum:
                - streamable-http
            path:
              type: string
              enum:
                - /mcp
    Region:
      type: object
      additionalProperties: false
      required:
        - x
        - y
        - width
        - height
      properties:
        x:
          type: number
          minimum: 0
          maximum: 1
          description: Normalized left coordinate, left divided by image width.
        y:
          type: number
          minimum: 0
          maximum: 1
          description: Normalized top coordinate, top divided by image height.
        width:
          type: number
          exclusiveMinimum: 0
          maximum: 1
          description: Normalized region width, region width divided by image width.
        height:
          type: number
          exclusiveMinimum: 0
          maximum: 1
          description: Normalized region height, region height divided by image height.
        paddingPixels:
          type: integer
          minimum: 0
          maximum: 500
          description: Optional pixel padding added around this region.
        blurRadius:
          type: number
          minimum: 0.3
          maximum: 100
          description: Optional blur radius for this region only.
    BlurOptions:
      type: object
      additionalProperties: false
      properties:
        blurRadius:
          type: number
          minimum: 0.3
          maximum: 100
          default: 14
          description: Default blur radius for all regions.
        outputType:
          type: string
          enum:
            - image/jpeg
            - image/jpg
            - image/png
            - image/webp
            - image/avif
          default: image/jpeg
          description: Output MIME type.
        quality:
          type: integer
          minimum: 1
          maximum: 100
          default: 92
          description: JPEG, WebP, or AVIF quality.
        returnDataUrl:
          type: boolean
          default: true
          description: Return image as a data URL when true, or raw base64 when false.
        inputMimeType:
          type: string
          default: image/jpeg
          description: Fallback MIME type for raw base64 input.
        regionPaddingPixels:
          type: integer
          minimum: 0
          maximum: 500
          default: 0
          description: Default pixel padding around all regions.
        fetchHeaders:
          type: object
          description: Restricted remote-fetch headers. Remote URLs are disabled unless enabled by environment.
          additionalProperties:
            type: string
    BlurSensitiveRegionsRequest:
      type: object
      additionalProperties: false
      required:
        - imageSource
        - regions
      properties:
        imageSource:
          type: string
          description: Raw base64 image, data URL, or HTTP/HTTPS URL when remote fetching is enabled.
        regions:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/Region'
        options:
          $ref: '#/components/schemas/BlurOptions'
    BlurSensitiveRegionsResponse:
      type: object
      required:
        - image
        - mimeType
        - outputFormat
        - width
        - height
        - regionsProcessed
      properties:
        image:
          type: string
          description: Redacted output image as a data URL or raw base64.
        mimeType:
          type: string
          enum:
            - image/jpeg
            - image/png
            - image/webp
            - image/avif
        outputFormat:
          type: string
          enum:
            - jpeg
            - png
            - webp
            - avif
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1
        regionsProcessed:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              examples:
                - INVALID_REGION
            message:
              type: string
              examples:
                - regions[0] must fit inside the normalized image bounds.
    JsonRpcRequest:
      type: object
      required:
        - jsonrpc
        - method
      properties:
        jsonrpc:
          type: string
          enum:
            - '2.0'
        id:
          oneOf:
            - type: string
            - type: integer
            - type: 'null'
        method:
          type: string
          examples:
            - tools/list
            - tools/call
        params:
          type: object
          additionalProperties: true
      additionalProperties: true
    JsonRpcResponse:
      type: object
      required:
        - jsonrpc
      properties:
        jsonrpc:
          type: string
          enum:
            - '2.0'
        id:
          oneOf:
            - type: string
            - type: integer
            - type: 'null'
        result:
          type: object
          additionalProperties: true
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: integer
            message:
              type: string
      additionalProperties: true
  responses:
    BadRequest:
      description: Invalid request or invalid image input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RequestTimeout:
      description: Remote image fetch timed out.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: Image input or region count exceeds service limits.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    MethodNotAllowed:
      description: HTTP method is not supported for this endpoint.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonRpcResponse'
    InternalServerError:
      description: Unexpected server-side error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
