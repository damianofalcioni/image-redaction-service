apiVersion: v1
kind: ConfigMap
metadata:
  name: image-redaction-service-config
  namespace: image-redaction
  labels:
    app.kubernetes.io/name: image-redaction-service
data:
  PORT: "3000"
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  MAX_IMAGE_BYTES: "10485760"
  MAX_REGIONS: "100"
  MAX_BATCH_IMAGES: "10"
  BATCH_CONCURRENCY: "4"
  MAX_PDF_BYTES: "26214400"
  MAX_PDF_PAGES: "100"
  FETCH_TIMEOUT_MS: "8000"
  ALLOW_REMOTE_IMAGE_SOURCE: "false"
  ALLOW_REMOTE_PDF_SOURCE: "false"
  CORS_ORIGIN: ""
